# tmux config - $XDG_CONFIG_HOME/tmux/tmux.conf (tmux 3.1+)

# Prefix: Ctrl-Space (default Ctrl-b is finger-pain)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Splits with intuitive keys (and open new pane in current dir)
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window in current dir
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize (capital = bigger steps)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# Vim copy-mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# Mouse support
set -g mouse on

# True color + 256 colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB,*256col*:RGB"

# Start window and pane numbering at 1 (easier than reaching for 0)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Larger history
set -g history-limit 50000

# Faster command sequences (less lag after Esc in vim)
set -sg escape-time 0

# Status bar - clean and informative
set -g status-position top
set -g status-style "bg=default,fg=white"
set -g status-left "#[bold]#S #[default]| "
set -g status-right "#(whoami)@#H | %a %Y-%m-%d %H:%M"
set -g status-left-length 30
set -g status-right-length 60
